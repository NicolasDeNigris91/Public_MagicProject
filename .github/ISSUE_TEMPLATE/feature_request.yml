name: Feature request
description: Suggest a gameplay rule, accessibility improvement, or UI change.
title: '[feat] '
labels: ['enhancement', 'triage']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What current limitation or rough edge motivates this?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: |
        Concrete: what does the player do, what does the screen reader hear,
        what changes in the engine?
    validations:
      required: true

  - type: textarea
    id: scope-fit
    attributes:
      label: Scope fit
      description: |
        This is a portfolio demo of a stripped-down MTG combat subset. New
        rules that fit that subset are easier to ship than ones that need a
        full stack (instants, abilities, etc.).

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
