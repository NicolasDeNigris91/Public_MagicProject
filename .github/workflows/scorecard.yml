name: OpenSSF Scorecard

# Weekly supply-chain hygiene audit + on every push to main. Produces a
# 0–10 score across signed releases, branch protection, dependency
# update tooling, dangerous workflow patterns, secrets exposure, and
# more. Results are uploaded to GitHub's code-scanning UI and surfaced
# via the public scorecard.dev API for the README badge.

on:
  branch_protection_rule:
  schedule:
    - cron: '23 5 * * 1'
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: OpenSSF Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed by the action to upload SARIF results to code-scanning.
      security-events: write
      # Needed to read enabled-protections via the OIDC token.
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes results so the public scorecard.dev API serves
          # the badge data. Set false if the repo must stay opaque.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          sarif_file: results.sarif
